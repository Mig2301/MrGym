<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrGym Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --accent: #16E0C4; --bg: #0a0e17; --card: #151b27; --text: #fff; --input: #1e2533; }
        
        /* BLOQUEO DE REFRESH EN CELULAR */
        html, body { 
            overscroll-behavior-y: contain; 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
        }

        .header { position: sticky; top: 0; background: rgba(10, 14, 23, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--accent); z-index: 1000; }
        
        /* BUSCADOR CON FILTRO */
        .search-area { max-width: 600px; margin: auto; }
        .search-flex { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: var(--input); color: #fff; font-size: 1rem; }
        
        /* CARD DISEÑO NUEVO */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; padding: 15px; }
        .card { 
            background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #2d3748;
            display: flex; gap: 15px; align-items: center;
        }
        .socio-foto { 
            width: 80px; height: 80px; border-radius: 15px; background: #1e2533; 
            object-fit: cover; border: 2px solid var(--accent); cursor: pointer;
        }
        .socio-info { flex: 1; min-width: 0; }
        .socio-info h3 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .socio-info p { margin: 3px 0; font-size: 0.8rem; color: #94a3b8; }

        /* BOTONES */
        .btn-group { display: flex; gap: 8px; margin-top: 8px; }
        .btn-main { 
            background: var(--accent); color: #000; border: none; padding: 12px; 
            border-radius: 8px; font-weight: bold; flex: 1; font-size: 0.85rem; cursor: pointer;
        }
        .btn-sec { 
            background: #2d3748; color: #fff; border: none; padding: 10px; 
            border-radius: 8px; font-size: 0.75rem; cursor: pointer;
        }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2d3748; z-index: 1000; }
        .tab { text-align: center; font-size: 0.7rem; color: #64748b; cursor: pointer; }
        .tab.active { color: var(--accent); }

        .hidden { display: none !important; }
        label.checkbox-label { font-size: 0.8rem; display: flex; align-items: center; gap: 5px; color: var(--accent); white-space: nowrap; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="search-area">
            <div class="search-flex">
                <input type="text" id="bus" placeholder="Buscar socio..." onkeyup="filtrar()">
                <label class="checkbox-label">
                    <input type="checkbox" id="solo-activos" onchange="filtrar()"> Activos
                </label>
            </div>
        </div>
    </div>

    <div id="v-socios" class="grid view"></div>
    <div id="v-sala" class="grid view hidden"></div>

    <nav class="nav">
        <div class="tab active" onclick="showTab('socios', this)">👤<br>Socios</div>
        <div class="tab" onclick="showTab('sala', this)">🔥<br>En Sala</div>
        <div class="tab" onclick="location.reload()">🔄<br>Cargar</div>
    </nav>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbw7xaoV8wtZBqBhP3eKjbg08cS9Y0EIAnUFQ8k0InkodslOFpN73iAX8oMSoHhuG0B-mA/exec";
    let DB = { socios: [], membresias: [], enSala: [] };

    async function req(action, data = {}) {
        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await r.json();
    }

    window.onload = async () => {
        const res = await req('INIT_DATA');
        DB = res;
        render(DB.socios, 'v-socios');
    };

    function render(list, containerId) {
        const cont = document.getElementById(containerId);
        cont.innerHTML = list.map(s => {
            const isActivo = s.ESTADO === 'ACTIVO';
            const nombreFull = `${s.NOMBRES} ${s.A_PATERNO} ${s.A_MATERNO}`;
            const foto = s.URL_FOTO || 'https://www.w3schools.com/howto/img_avatar.png';
            
            return `
            <div class="card">
                <img src="${foto}" class="socio-foto" onclick="subirFoto('${s.ID_SOCIO}')" onerror="this.src='https://www.w3schools.com/howto/img_avatar.png'">
                <div class="socio-info">
                    <h3>${nombreFull}</h3>
                    <p>DNI: ${s.DNI} | <b>${s.ESTADO}</b></p>
                    <div class="btn-group">
                        <button class="btn-main" onclick="asistencia('${s.ID_SOCIO}')">ASISTENCIA</button>
                        ${!isActivo ? `<button class="btn-sec" onclick="modalMatricular('${s.ID_SOCIO}')">MATRICULAR</button>` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function filtrar() {
        const q = document.getElementById('bus').value.toLowerCase();
        const soloActivos = document.getElementById('solo-activos').checked;
        const res = DB.socios.filter(s => {
            const matchQuery = `${s.NOMBRES} ${s.A_PATERNO} ${s.DNI}`.toLowerCase().includes(q);
            const matchActivo = soloActivos ? s.ESTADO === 'ACTIVO' : true;
            return matchQuery && matchActivo;
        });
        render(res, 'v-socios');
    }

    async function asistencia(id) {
        const res = await req('ASISTENCIA', { idSocio: id });
        if(res.success) {
            Swal.fire({ title: '¡Bienvenido!', text: `Entrada: ${res.hora}`, icon: 'success', timer: 1500, showConfirmButton: false });
            // Actualizar lista en sala localmente
            if(!DB.enSala.includes(id)) DB.enSala.push(id);
        }
    }

    function showTab(t, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(t === 'sala') {
            const list = DB.socios.filter(u => DB.enSala.includes(u.ID_SOCIO));
            render(list, 'v-sala');
        }
    }

    async function modalMatricular(id) {
        const socio = DB.socios.find(s => s.ID_SOCIO === id);
        const options = DB.membresias.reduce((acc, m) => {
            acc[m.ID_MEM] = `${m.NOMBRE_MEMBRESIA} - S/ ${m.PRECIO}`;
            return acc;
        }, {});

        const { value: planId } = await Swal.fire({
            title: 'Matricular Socio',
            input: 'select',
            inputOptions: options,
            inputPlaceholder: 'Seleccione un plan',
            showCancelButton: true
        });

        if (planId) {
            const plan = DB.membresias.find(m => m.ID_MEM === planId);
            const res = await req('MATRICULAR', {
                idSocio: id, dni: socio.DNI, nom: socio.NOMBRES,
                idMem: planId, plan: plan.NOMBRE_MEMBRESIA,
                inicio: new Date().toISOString().split('T')[0],
                fin: 'Calculado...', // Lógica de meses/días
                total: plan.PRECIO, abono: plan.PRECIO, saldo: 0, metodo: 'EFECTIVO'
            });
            if(res.success) Swal.fire('Éxito', 'Socio matriculado', 'success');
        }
    }

    async function subirFoto(id) {
        const { value: file } = await Swal.fire({
            title: 'Actualizar Foto',
            input: 'file',
            inputAttributes: { 'accept': 'image/*', 'capture': 'environment' }
        });
        if (file) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const res = await req('UPLOAD_FOTO', { idSocio: id, base64: e.target.result });
                if(res.success) {
                    Swal.fire('Guardado', 'Foto actualizada', 'success');
                    location.reload();
                }
            };
            reader.readAsDataURL(file);
        }
    }
</script>
</body>
</html>
