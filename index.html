<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrGym Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --accent: #16E0C4; --bg: #0a0e17; --card: #151b27; --text: #ffffff; --input: #1e2533; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* LOGIN PREDICTIVO */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-box { background: var(--card); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #2d3748; }
        .login-box h1 { color: var(--accent); font-size: 3rem; margin: 0 0 10px 0; }
        
        /* BUSCADOR INTELIGENTE */
        .header { position: sticky; top: 0; background: rgba(10, 14, 23, 0.95); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--accent); z-index: 1000; }
        .search-container { position: relative; max-width: 600px; margin: auto; }
        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; background: var(--input); color: #fff; font-size: 1rem; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(22, 224, 196, 0.2); }

        /* LISTAS Y CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #2d3748; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; padding: 4px 8px; border-radius: 20px; }
        
        /* TAB BAR */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #2d3748; }
        .tab { cursor: pointer; text-align: center; font-size: 0.7rem; color: #64748b; transition: 0.3s; }
        .tab.active { color: var(--accent); font-weight: bold; }
        
        .btn { background: var(--accent); color: #000; padding: 15px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .hidden { display: none !important; }
        
        /* SECCIÓN EN SALA */
        .sala-indicator { background: rgba(22, 224, 196, 0.1); border-left: 4px solid var(--accent); padding: 10px; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>MrGym</h1>
        <p style="color:#64748b">Gestión de Alto Rendimiento</p>
        <input list="users-list" id="l-user" placeholder="Usuario">
        <datalist id="users-list"></datalist>
        <input type="password" id="l-pass" placeholder="Contraseña" style="margin-top:15px;">
        <button class="btn" onclick="tryLogin()" id="btn-login" style="margin-top:20px;">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center; max-width:600px; margin:auto;">
            <h2 style="color:var(--accent); margin:0;">MrGym Pro</h2>
            <div id="user-info" style="font-size:0.8rem; color:var(--accent)"></div>
        </div>
        <div class="search-container" style="margin-top:10px;">
            <input type="text" id="main-bus" placeholder="🔍 Buscar socio o DNI..." onkeyup="motorBusqueda()">
        </div>
    </div>

    <!-- VISTA 1: SOCIOS / ASISTENCIA -->
    <div id="v-socios" class="view">
        <div class="grid" id="grid-socios"></div>
    </div>

    <!-- VISTA 2: EN SALA / VENTAS -->
    <div id="v-sala" class="view hidden">
        <div class="container" style="padding:15px;">
            <h3 style="color:var(--accent)">SOCIOS EN SALA (Últimas 2h)</h3>
            <div id="grid-sala" class="grid"></div>
        </div>
    </div>

    <!-- VISTA 3: INVENTARIO -->
    <div id="v-stock" class="view hidden">
        <div class="grid" id="grid-stock"></div>
    </div>

    <nav class="nav">
        <div class="tab active" onclick="showTab('socios', this)">👤<br>Socios</div>
        <div class="tab" onclick="showTab('sala', this)">🔥<br>En Sala</div>
        <div class="tab" onclick="showTab('stock', this)">📦<br>Inventario</div>
        <div class="tab" onclick="location.reload()">🔄<br>Salir</div>
    </nav>
</div>

<script>
    const API_URL = "TU_URL_DE_GOOGLE_SCRIPT_AQUI";
    let DB = { usuarios: [], membresias: [], productos: [], login: [], enSala: [] };

    async function call(action, data = {}) {
        const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await r.json();
    }

    // Inicialización
    window.onload = async () => {
        const res = await call('INIT_DATA');
        DB = res;
        document.getElementById('users-list').innerHTML = res.login.map(l => `<option value="${l.u}">`).join('');
    };

    function tryLogin() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;
        const match = DB.login.find(l => l.u.toLowerCase() === u.toLowerCase() && l.c === p);
        if(match) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-info').innerText = `${match.u} (${match.r})`;
            renderSocios(DB.usuarios);
        } else {
            Swal.fire('Error', 'Usuario o clave incorrecta', 'error');
        }
    }

    function renderSocios(list) {
        const cont = document.getElementById('grid-socios');
        cont.innerHTML = list.slice(0, 50).map(s => {
            const isActivo = s.ESTADO === 'ACTIVO';
            return `
            <div class="card">
                <span class="status-badge" style="background:${isActivo ? '#16E0C4' : '#f87171'}; color:#000">
                    ${s.ESTADO}
                </span>
                <h3 style="margin:0">${s.NOMBRES}</h3>
                <p style="color:#64748b; font-size:0.8rem; margin:5px 0;">DNI: ${s.DNI} | ID: ${s.ID_SOCIO}</p>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn" style="padding:8px; font-size:0.8rem;" onclick="accionSocio('${s.ID_SOCIO}')">
                        ${isActivo ? '⚡ CHECK-IN' : '💳 MATRICULAR'}
                    </button>
                    <button class="btn" style="padding:8px; font-size:0.8rem; background:#444; color:#fff;" onclick="abrirMedidas('${s.ID_SOCIO}')">
                        📏 MEDIDAS
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    async function accionSocio(id) {
        const socio = DB.usuarios.find(u => u.ID_SOCIO === id);
        if(socio.ESTADO === 'ACTIVO') {
            const res = await call('CHECK_IN', { idSocio: id });
            Swal.fire('Bienvenido', `Check-in realizado a las ${res.hora}`, 'success');
        } else {
            Swal.fire('Matrícula', 'Redirigiendo a zona de pagos...', 'info');
            // Aquí llamarías a tu función de membresías
        }
    }

    function motorBusqueda() {
        const q = document.getElementById('main-bus').value.toLowerCase();
        const words = q.split(' ').filter(w => w.length > 0);
        const filtrados = DB.usuarios.filter(s => {
            const full = `${s.NOMBRES} ${s.A_PATERNO} ${s.DNI} ${s.ID_SOCIO}`.toLowerCase();
            return words.every(w => full.includes(w));
        });
        renderSocios(filtrados);
    }

    function showTab(t, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById('v-'+t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(t === 'sala') renderSala();
        if(t === 'stock') renderStock();
    }

    function renderSala() {
        const cont = document.getElementById('grid-sala');
        const list = DB.usuarios.filter(u => DB.enSala.includes(u.ID_SOCIO));
        cont.innerHTML = list.length ? list.map(s => `
            <div class="card" style="border-color:var(--accent)">
                <h3 style="margin:0">${s.NOMBRES}</h3>
                <p style="color:var(--accent); font-size:0.8rem;">En sala ahora</p>
                <button class="btn" style="background:#fff" onclick="venderASocio('${s.ID_SOCIO}')">🛒 VENDER SUPLEMENTO</button>
            </div>`).join('') : '<p style="text-align:center; width:100%;">No hay socios registrados en sala ahora.</p>';
    }

    function renderStock() {
        const cont = document.getElementById('grid-stock');
        cont.innerHTML = DB.productos.map(p => `
            <div class="card">
                <h3>${p.PRODUCTO}</h3>
                <p style="color:var(--accent)">S/ ${p.PRECIO_UNIT}</p>
                <p>Stock: <b>${p.STOCK}</b></p>
                <button class="btn" onclick="venderASocio('WALK-IN', '${p.PRODUCTO}')">VENDER</button>
            </div>`).join('');
    }

    // Funciones de Venta y Medidas (SweetAlert2 Modals)
    async function abrirMedidas(id) {
        const { value: formValues } = await Swal.fire({
            title: 'Control de Medidas',
            html:
                '<input id="sw-peso" class="swal2-input" placeholder="Peso (kg)">' +
                '<input id="sw-objetivo" class="swal2-input" placeholder="Objetivo">' +
                '<input id="sw-cintura" class="swal2-input" placeholder="Cintura (cm)">',
            focusConfirm: false,
            preConfirm: () => {
                return {
                    idSocio: id,
                    peso: document.getElementById('sw-peso').value,
                    objetivo: document.getElementById('sw-objetivo').value,
                    cintura: document.getElementById('sw-cintura').value
                }
            }
        });
        if (formValues) {
            await call('GUARDAR_MEDIDAS', formValues);
            Swal.fire('Guardado', 'Las medidas se registraron correctamente', 'success');
        }
    }
</script>

</body>
</html>
