<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrGym Pro</title>
  <style>
    :root { --accent: #16E0C4; --bg: #0b101b; --card: #161b2c; --text: #fff; --input: #1f2937; }
    body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
    
    /* LOGIN GIGANTE */
    #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-box { background: var(--card); padding: 50px; border-radius: 20px; width: 420px; text-align: center; border: 2px solid #2d3748; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .login-box h1 { color: var(--accent); font-size: 3.5rem; margin: 0 0 30px 0; }

    input, select { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #334155; background: var(--input); color: #fff; font-size: 1.1rem; box-sizing: border-box; outline: none; }
    input:focus { border-color: var(--accent); }
    
    .btn { background: var(--accent); color: #000; padding: 18px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
    .btn:disabled { background: #444; cursor: not-allowed; }

    /* DASHBOARD */
    .header { position: sticky; top: 0; background: rgba(11, 16, 27, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 2px solid var(--accent); z-index: 1000; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; cursor: pointer; }
    .card:hover { border-color: var(--accent); }
    
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1500; }
    .modal-cont { background: var(--card); padding: 30px; border-radius: 20px; width: 90%; max-width: 480px; border: 1px solid var(--accent); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- PANTALLA LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h1>MrGym</h1>
      <input list="users-list" id="l-user" placeholder="Nombre de usuario">
      <datalist id="users-list"></datalist>
      <input type="password" id="l-pass" placeholder="Contraseña">
      <button class="btn" onclick="ejecutarLogin()" id="btn-login">INGRESAR</button>
      <p id="err" style="color:#ff4d4d; margin-top:15px; display:none;"></p>
    </div>
  </div>

  <!-- APLICACIÓN -->
  <div id="app" class="hidden">
    <div class="header">
      <div style="max-width:1200px; margin:auto; display:flex; gap:20px; align-items:center;">
        <h2 style="color:var(--accent); margin:0;">MrGym Pro</h2>
        <input type="text" id="bus" placeholder="🔍 Buscar palabras (Ej: 0001 Isaias)..." onkeyup="filtrar()" style="margin:0;">
      </div>
    </div>
    <div id="list-socios" class="grid"></div>
  </div>

  <script>
    // 1. REEMPLAZA ESTO CON TU URL DE IMPLEMENTACIÓN DE GOOGLE
    const WEB_APP_URL = "URL_DE_TU_SCRIPT_AQUÍ";

    let DB = { socios: [], membresias: [] };

    // Función universal para comunicarse con Google
    async function api(action, data = {}) {
      const resp = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action, data })
      });
      return await resp.json();
    }

    // Al cargar, obtener usuarios para el Autocomplete
    window.onload = async () => {
      const users = await api('GET_LOGIN_USERS');
      document.getElementById('users-list').innerHTML = users.map(u => `<option value="${u}">`).join('');
    };

    async function ejecutarLogin() {
      const u = document.getElementById('l-user').value;
      const p = document.getElementById('l-pass').value;
      const btn = document.getElementById('btn-login');
      
      btn.innerText = "VERIFICANDO...";
      btn.disabled = true;

      const res = await api('LOGIN', { user: u, pass: p });

      if (res.success) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        cargarDatos();
      } else {
        document.getElementById('err').innerText = "Credenciales inválidas";
        document.getElementById('err').style.display = "block";
        btn.innerText = "INGRESAR";
        btn.disabled = false;
      }
    }

    async function cargarDatos() {
      const res = await api('GET_INITIAL_DATA');
      DB = res;
      render(res.socios);
    }

    function filtrar() {
      const q = document.getElementById('bus').value.toLowerCase();
      const pal = q.split(' ').filter(x => x.length > 0);
      const res = DB.socios.filter(s => {
        const t = `${s.ID_SOCIO} ${s.NOMBRES} ${s.A_PATERNO} ${s.DNI}`.toLowerCase();
        return pal.every(p => t.includes(p));
      });
      render(res);
    }

    function render(lista) {
      document.getElementById('list-socios').innerHTML = lista.slice(0, 50).map(s => `
        <div class="card">
          <h3 style="margin:0; color:var(--accent)">${s.NOMBRES} ${s.A_PATERNO}</h3>
          <p style="margin:5px 0; font-size:0.85rem; color:#94a3b8">DNI: ${s.DNI} | ID: ${s.ID_SOCIO}</p>
          <b style="color:${s.ESTADO==='ACTIVO'?'var(--accent)':'#ff4d4d'}">● ${s.ESTADO}</b>
        </div>`).join('');
    }
  </script>
</body>
</html>
